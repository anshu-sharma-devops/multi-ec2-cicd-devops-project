apiVersion: apps/v1
kind: Deployment

metadata:
  name: devops-web

spec:
  replicas: 2

  selector:
    matchLabels:
      app: devops-web

  template:
    metadata:
      labels:
        app: devops-web

    spec:
      containers:
      - name: devops-web

        image: 354354997875.dkr.ecr.ap-south-1.amazonaws.com/devops-web:latest

        ports:
        - containerPort: 80